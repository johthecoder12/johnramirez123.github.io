<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            text-align: center;
        }

        header {
            background: #222;
            color: white;
            padding: 20px;
        }

        .hero {
            padding: 80px 20px;
        }

        h1 {
            font-size: 3rem;
        }

        .button {
            display: inline-block;
            background: #007bff;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 8px;
            margin-top: 20px;
        }

        footer {
            margin-top: 50px;
            padding: 20px;
            background: #222;
            color: white;
        }
    </style>
</head>
<body>

<header>
    <h2>Welcome to My Website</h2>
</header>

<section class="hero">
    <h1>Hello World!</h1>
    <p>My website is live on GitHub Pages.</p>

    <a class="button" href="https://github.com">
        Visit GitHub
    </a>
</section>

<footer>
    © 2026 My Website
</footer>

</body>
</html>
