<!DOCTYPE html>
<html>
<head>
    <title>My Website</title>

    <style>
        body {
            background-color: #f4f4f4;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
        }

        h1 {
            color: #333;
        }

        p {
            color: #666;
            font-size: 20px;
        }

        .button {
            display: inline-block;
            padding: 15px 25px;
            background-color: #0077ff;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            margin-top: 20px;
        }

        .button:hover {
            background-color: #0057c2;
        }
    </style>
</head>

<body>

    <h1>Welcome to My Website</h1>

    <p>This website is hosted for free using GitHub Pages.</p>

    <a class="button" href="https://github.com">
        Visit GitHub
    </a>

</body>
</html>
